<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Script Kittens Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
    p  { color: #888; margin-bottom: 40px; font-size: 0.95rem; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-top: 3px solid #8b0000;
      border-radius: 8px;
      padding: 32px 40px;
      width: 240px;
      text-decoration: none;
      color: #fff;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-top-color: #cc3333; transform: translateY(-3px); }
    .card .icon { font-size: 2rem; margin-bottom: 12px; }
    .card h2   { font-size: 1rem; margin-bottom: 6px; }
    .card span { font-size: 0.8rem; color: #666; }
    footer { margin-top: 60px; color: #333; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>⚙️ Script Kittens Bot</h1>
  <p>Legal documents for the Script Kittens Discord Bot</p>

  <div class="cards">
    <a href="terms.html" class="card">
      <div class="icon">📋</div>
      <h2>Terms of Service</h2>
      <span>Usage rules &amp; conditions</span>
    </a>
    <a href="privacy.html" class="card">
      <div class="icon">🔒</div>
      <h2>Privacy Policy</h2>
      <span>What data we collect &amp; why</span>
    </a>
  </div>

  <footer>© 2026 Script Kittens. All rights reserved.</footer>
</body>
</html>
